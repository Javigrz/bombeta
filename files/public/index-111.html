<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>111 Originale · Sistema con IA para vivir y trabajar</title>
<meta name="description" content="111 prompts. Un sistema. Para vivir y trabajar con IA. Diseñado dentro de la IA bancaria. Probado en startups. Construido para tu vida.">

<!-- Tipografías:
     - Instrument Serif (italic activo) → títulos base + énfasis
     - Pinyon Script → primera letra ornamentada de cada header
     - Space Grotesk → cuerpo, microcopy, nav
     - JetBrains Mono → código (futuras secciones de prompts) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Pinyon+Script&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --cream: #FAF5EB;
  --dark: #4B0A23;
  --red: #FE4629;
  --muted: #8B7355;
  --card: #F3EBD9;

  --space-xs: clamp(8px, 1.5vw, 12px);
  --space-sm: clamp(16px, 2vw, 20px);
  --space-md: clamp(24px, 3vw, 32px);
  --space-lg: clamp(40px, 5vw, 64px);
  --space-xl: clamp(64px, 8vw, 96px);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--cream);
  color: var(--dark);
  line-height: 1.6;
  overflow-x: hidden;
  font-feature-settings: "kern" 1, "liga" 1;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ===== NAV =====
   Completamente transparente para no cortar la foto del hero.
   mix-blend-mode: difference en el texto invierte el color automáticamente
   según el fondo (claro sobre oscuro, oscuro sobre claro). Funciona sobre
   la foto del hero y sobre el cream del resto de secciones. */
.top-nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: transparent;
  isolation: isolate;
}

.nav-logo {
  display: flex;
  align-items: center;
  text-decoration: none;
  min-height: 48px;
  filter: drop-shadow(0 1px 6px rgba(0, 0, 0, 0.25));
}

.nav-logo img {
  height: 22px;
  width: auto;
  display: block;
}

.nav-back {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--red);
  text-decoration: none;
  letter-spacing: 0.3px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  min-height: 48px;
  padding: 0 8px;
  transition: opacity 0.25s ease;
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.18);
}

.nav-back:hover {
  opacity: 0.7;
}

.nav-back:hover { color: var(--dark); }

.nav-back-arrow {
  display: inline-block;
  transition: transform 0.25s ease;
}

.nav-back:hover .nav-back-arrow { transform: translateX(-3px); }

/* RELOJ EN VIVO
   Centro de la nav. Detalle luxury digital tipo Stripe/Bottega.
   Hora local del usuario actualizada cada segundo.
   JetBrains Mono para que los números mantengan su grid (monoespaciado).
   Tabular-nums asegura que los dígitos no salten al cambiar de cifra. */
.nav-clock {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  color: #ffffff;
  letter-spacing: 0.5px;
  font-variant-numeric: tabular-nums;
  user-select: none;
  display: flex;
  align-items: center;
  min-height: 48px;
  opacity: 0;
  animation: fadeInClock 0.8s ease 0.3s forwards;
  mix-blend-mode: difference;
  /* Centrado real al viewport, independiente del ancho de logo y Javi Gil */
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
}

@keyframes fadeInClock {
  to { opacity: 1; }
}

/* Estilo del "11" destacado en el reloj.
   Color naranja como guiño al branding 111 Originale.
   isolation+position aísla del mix-blend-mode del padre nav-clock. */
.dgt-11 {
  color: var(--red);
  mix-blend-mode: normal;
  isolation: isolate;
  position: relative;
  z-index: 1;
}

/* ===== HERO ===== 
   Estructura final:
   - SVG 111 inline (protagonista visual de marca)
   - Primera letra "P" en Pinyon Script (firma editorial luxury)
   - Resto en Instrument Serif
   - "sistema" en italic (segundo acento calligraphic)
   - Escala tipográfica grande (clamp hasta 140px)
   - Line-height cerrado (0.92)
   - Tracking negativo agresivo (-0.03em)
*/
.hero {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 100px var(--space-md) 60px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

/* CONTENEDOR DE LA FOTO DEL HERO
   Capa absoluta del body que cubre toda el área visual del hero,
   incluyendo el espacio de la nav (que es transparente).
   Así la imagen llega hasta arriba del todo sin cortes. */
.hero-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  height: 100dvh;
  z-index: 3;
  overflow: hidden;
  pointer-events: none;
}

/* FOTO DE FONDO DEL HERO
   Parallax sutil al mover el cursor (variables --hpx --hpy del JS). */
.hero-photo {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: url('hero_photo.png');
  background-size: cover;
  background-position: center center;
  background-repeat: no-repeat;
  opacity: 1;
  transform: scale(1.08) translate(calc(var(--hpx, 0) * -25px), calc(var(--hpy, 0) * -25px));
  transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  will-change: transform;
}

/* Overlay sutil: gradiente radial donde el centro es casi transparente
   (deja ver la foto) y los bordes tienen un poco de cream para integrar
   la foto con el resto de la página. */
.hero-photo-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(
    ellipse at center,
    rgba(250, 245, 235, 0.15) 0%,
    rgba(250, 245, 235, 0.4) 70%,
    rgba(250, 245, 235, 0.65) 100%
  );
  pointer-events: none;
}

/* En táctil: sin parallax, foto fija */
@media (hover: none) and (pointer: coarse) {
  .hero-photo {
    transform: scale(1.05);
    transition: none;
  }
}

@media (prefers-reduced-motion: reduce) {
  .hero-photo {
    transform: scale(1.05) !important;
    transition: none;
  }
}

/* TÍTULO PRINCIPAL */
.hero h1 {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(56px, 8vw, 100px);
  line-height: 0.95;
  font-weight: 400;
  letter-spacing: -0.03em;
  margin-bottom: var(--space-lg);
  position: relative;
  z-index: 5;
  max-width: 100%;
  color: var(--dark);
}

/* Cada línea del título es un span block.
   .line-gap añade espacio extra a la línea que abre nueva idea
   (en este caso entre "Prompts." y "Un sistema."). */
.hero h1 .line {
  display: block;
}

.hero h1 .line-gap {
  margin-top: 0.25em;
}

/* SVG 111 inline.
   Anclado a baseline (igual que la P de Pinyon) para que ambos crezcan
   desde la misma línea base hacia arriba. Tamaño 1.3em es el punto medio
   entre la P (1.9em) y el texto normal (1em). */
.hero h1 .svg-111 {
  display: inline-block;
  height: 1.3em;
  width: auto;
  vertical-align: baseline;
  margin-right: 0.18em;
  margin-bottom: -0.05em;
}

/* PRIMERA LETRA EN PINYON SCRIPT
   La firma visual del proyecto.
   Estilo Shopify Winter 2026: la inicial caligráfica crece HACIA ARRIBA
   desde la baseline del texto, no centrada. Por eso usamos baseline en
   vertical-align y ajustamos line-height a 0 para que no fuerce altura
   en el contenedor. La P se ancla con el resto y todo el ornamento
   asciende sin descender por debajo. */
.hero h1 .swash,
.section-title .swash {
  font-family: 'Pinyon Script', cursive;
  font-size: 1.9em;
  font-weight: 400;
  font-style: normal;
  display: inline-block;
  vertical-align: baseline;
  line-height: 0;
  margin-right: 0.05em;
  margin-left: -0.02em;
  color: inherit;
}

/* Énfasis en "sistema" en italic */
.hero h1 em {
  font-style: italic;
  font-weight: 400;
  color: var(--dark);
}

/* Highlight en naranja para palabras destacadas del título.
   Se aplica selectivamente, ej: "IA". */
.hero h1 .hl {
  color: var(--red);
}

/* GANCHO DE VALOR
   Instrument Serif (misma familia del título) para continuidad luxury editorial.
   Tamaño body grande, line-height generoso. Sin italic para diferenciarse del título.
   Esta es la técnica que usa Shopify Winter 2026: misma serif para todo. */
.hero-tagline {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(20px, 2vw, 22px);
  line-height: 1.45;
  font-weight: 400;
  color: var(--dark);
  max-width: 540px;
  margin: 0 auto var(--space-lg);
  position: relative;
  z-index: 5;
  letter-spacing: -0.005em;
}

.hero-tagline .line { display: block; }
.hero-tagline .line + .line { margin-top: 4px; }

/* CTA */
.hero-cta {
  position: relative;
  z-index: 5;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  text-decoration: none;
  cursor: pointer;
}

.hero-arrow {
  width: 46px;
  height: 46px;
  border: 1.5px solid var(--dark);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: var(--dark);
  text-decoration: none;
  transition: all 0.3s ease;
  animation: floatArrow 2.4s ease-in-out infinite;
  background: transparent;
}

.hero-cta:hover .hero-arrow {
  background: var(--dark);
  color: var(--cream);
  animation-play-state: paused;
}

.hero-cta-label {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 0.5px;
  text-transform: lowercase;
  transition: color 0.3s ease;
}

.hero-cta:hover .hero-cta-label { color: var(--dark); }

@keyframes floatArrow {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(6px); }
}

/* ===== PLACEHOLDER PRÓXIMA SECCIÓN ===== */
.placeholder-next {
  min-height: 50vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--cream);
  padding: var(--space-xl) var(--space-md);
  text-align: center;
  border-top: 1px solid rgba(75, 10, 35, 0.06);
}

.placeholder-next p {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .top-nav { padding: 14px 20px; }
  .nav-logo img { height: 20px; }
  .hero { padding: 110px var(--space-sm) 50px; }
  .hero h1 {
    max-width: 100%;
    letter-spacing: -0.025em;
  }
}

@media (max-width: 480px) {
  .top-nav { padding: 12px 12px; }
  .nav-back { font-size: 11px; gap: 5px; padding: 0 4px; }
  .nav-clock { font-size: 11px; gap: 6px; }
  .nav-logo img { height: 18px; }
  .hero h1 { line-height: 0.95; }
  .hero-tagline { font-size: 19px; line-height: 1.4; }
}

@media (max-width: 380px) {
  .nav-back span:last-child { display: none; }
  .nav-clock { font-size: 10px; }
}

@media (max-width: 360px) {
  .hero-cta-label { display: none; }
}

@media (prefers-reduced-motion: reduce) {
  .hero-arrow { animation: none; }
  * {
    transition-duration: 0.01ms !important;
    animation-duration: 0.01ms !important;
  }
}

::selection {
  background: var(--red);
  color: var(--cream);
}

/* ===== CAPA DE GRANO (NOISE) =====
   Textura premium estilo old money / editorial digital.
   Estática. Muy sutil. La interactividad la añade el canvas .cursor-trail. */
.grain-layer {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
  opacity: 0.4;
  mix-blend-mode: multiply;
  background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.294  0 0 0 0 0.039  0 0 0 0 0.137  0 0 0 0.55 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  background-size: 220px 220px;
  background-repeat: repeat;
}

/* Capa de grano base permanente */
.grain-base {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
  opacity: 0.22;
  mix-blend-mode: multiply;
  background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.2' numOctaves='1' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.294  0 0 0 0 0.039  0 0 0 0 0.137  0 0 0 0.4 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  background-size: 180px 180px;
}

/* CANVAS DEL TRAIL/ESTELA
   Posicionado encima del grano. Cada movimiento del cursor pinta cream
   con gradiente radial. En cada frame todo el canvas se va borrando
   gradualmente (destination-out con alpha bajo) creando el efecto de
   estela que se desvanece. */
.cursor-trail {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 2;
}

/* Asegurar que el contenido del flujo (hero y siguientes) vive por encima
   de las capas de fondo (granos, foto, trail). El nav mantiene su propia
   regla con position fixed y z-index 100. */
.hero,
.placeholder-next {
  position: relative;
  z-index: 10;
}

/* En reduced motion: sin trail */
@media (prefers-reduced-motion: reduce) {
  .cursor-trail {
    display: none;
  }
}

/* En táctil: sin trail (no hay cursor real) */
@media (hover: none) and (pointer: coarse) {
  .cursor-trail {
    display: none;
  }
}
</style>
</head>
<body>

<!-- Capas de grano (noise) old money / editorial digital.
     .grain-base = grano sutil estático permanente.
     .grain-layer = grano principal estático.
     .cursor-trail = canvas que dibuja la estela del cursor encima del grano. -->
<div class="grain-base" aria-hidden="true"></div>
<div class="grain-layer" id="grainLayer" aria-hidden="true"></div>
<canvas class="cursor-trail" id="cursorTrail" aria-hidden="true"></canvas>

<!-- Foto de fondo del hero como capa absoluta del body.
     Así puede cubrir también el espacio de la nav sin ser recortada
     por el overflow:hidden del hero. -->
<div class="hero-bg" aria-hidden="true">
  <div class="hero-photo" id="heroPhoto"></div>
  <div class="hero-photo-overlay"></div>
</div>

<nav class="top-nav">
  <a href="#hero" class="nav-logo" aria-label="111 Originale">

  </a>
  <div class="nav-clock" id="navClock" aria-label="Hora actual">
    <span id="clockTime">--:--:--</span>
  </div>
  <a href="https://javiggil.com" class="nav-back" aria-label="Volver a la página principal de Javi Gil">
    <span class="nav-back-arrow">←</span>
    <span>Javi Gil</span>
  </a>
</nav>

<section class="hero" id="hero">

  <h1>
    <span class="line"><img src="assets/logos/111.svg" alt="111" class="svg-111"> <span class="swash">P</span>rompts.</span>
    <span class="line line-gap">Un <em>sistema</em>.</span>
    <span class="line">Para vivir y trabajar con <span class="hl">IA</span>.</span>
  </h1>

    <span class="line">Diseñado dentro de la IA bancaria.</span>
    <span class="line">Probado en startups.</span>

  </a>

</section>

<section class="placeholder-next" id="problema">
  <p>· Sección 2: Problema agitado · próximamente ·</p>
</section>


<!-- PARALLAX FOTO HERO
     La foto se desplaza sutilmente en dirección opuesta al cursor.
     Variables --hpx --hpy reciben la posición normalizada (-1 a 1).
     Movimiento muy contenido (max 25px) para sensación de profundidad
     sin distraer del contenido. -->
<script>
  (function initHeroParallax() {
    const photo = document.getElementById('heroPhoto');
    if (!photo) return;

    const isTouch = window.matchMedia('(hover: none) and (pointer: coarse)').matches;
    if (isTouch) return;

    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

    let targetX = 0, targetY = 0;
    let currentX = 0, currentY = 0;
    let rafId = null;

    function onMouseMove(e) {
      // Normalizar posición a rango -1 a 1
      targetX = (e.clientX / window.innerWidth) * 2 - 1;
      targetY = (e.clientY / window.innerHeight) * 2 - 1;
      if (!rafId) rafId = requestAnimationFrame(update);
    }

    function update() {
      // Lerp para movimiento suave (no instantáneo)
      currentX += (targetX - currentX) * 0.06;
      currentY += (targetY - currentY) * 0.06;

      photo.style.setProperty('--hpx', currentX.toFixed(3));
      photo.style.setProperty('--hpy', currentY.toFixed(3));

      if (Math.abs(targetX - currentX) > 0.001 || Math.abs(targetY - currentY) > 0.001) {
        rafId = requestAnimationFrame(update);
      } else {
        rafId = null;
      }
    }

    window.addEventListener('mousemove', onMouseMove, { passive: true });
  })();
</script>

<!-- TRAIL/ESTELA DEL CURSOR
     Canvas donde se dibuja el rastro del cursor.
     Cada movimiento pinta cream con gradiente radial encima del grano.
     Cada frame se aplica un fade muy lento (destination-out + alpha bajo)
     que hace desaparecer gradualmente la estela vieja.
     Resultado: línea de cream que sigue al cursor y se desvanece tras él. -->
<script>
  (function initCursorTrail() {
    const canvas = document.getElementById('cursorTrail');
    if (!canvas) return;

    const isTouch = window.matchMedia('(hover: none) and (pointer: coarse)').matches;
    if (isTouch) return;

    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

    const ctx = canvas.getContext('2d');
    const dpr = Math.min(window.devicePixelRatio || 1, 2);

    let w = 0, h = 0;
    let lastX = null, lastY = null;
    let currentX = -9999, currentY = -9999;

    function resize() {
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.scale(dpr, dpr);
    }

    resize();
    window.addEventListener('resize', resize);

    function onMouseMove(e) {
      currentX = e.clientX;
      currentY = e.clientY;
    }

    window.addEventListener('mousemove', onMouseMove, { passive: true });

    // Salida del cursor: invalidar lastX para que no se conecte con el próximo
    document.addEventListener('mouseleave', () => {
      lastX = null;
      lastY = null;
    });

    function drawSpot(x, y) {
      const radius = 280;
      const grad = ctx.createRadialGradient(x, y, 0, x, y, radius);
      // Un único círculo, gradiente simple, alpha muy baja.
      // Sin interpolación: un solo punto por frame para evitar solape entre círculos
      // que generaba anillos visibles.
      grad.addColorStop(0, 'rgba(250, 245, 235, 0.035)');
      grad.addColorStop(1, 'rgba(250, 245, 235, 0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    function tick() {
      // FADE: borrar gradualmente lo viejo.
      ctx.globalCompositeOperation = 'destination-out';
      ctx.fillStyle = 'rgba(0, 0, 0, 0.045)';
      ctx.fillRect(0, 0, w, h);

      // DIBUJAR UN ÚNICO círculo central en posición del cursor,
      // SOLO si el cursor se ha movido (sin acumulación cuando está quieto).
      const hasMoved = lastX !== null && (currentX !== lastX || currentY !== lastY);

      if (currentX > -9000 && (lastX === null || hasMoved)) {
        ctx.globalCompositeOperation = 'source-over';
        drawSpot(currentX, currentY);
        lastX = currentX;
        lastY = currentY;
      }

      requestAnimationFrame(tick);
    }

    tick();
  })();
</script>

<!-- INFO TRIGGER (ya eliminado - placeholder por si vuelve) -->

<!-- RELOJ EN VIVO
     Actualiza la hora local del usuario cada segundo.
     Formato HH:MM:SS con padding 0 para mantener anchura constante.
     Tabular-nums en CSS asegura que los dígitos no salten visualmente.
     Cada secuencia "11" se destaca en naranja como guiño al branding 111 Originale. -->
<script>
  (function initLiveClock() {
    const el = document.getElementById('clockTime');
    if (!el) return;

    function pad(n) {
      return n < 10 ? '0' + n : '' + n;
    }

    function highlightElevens(timeStr) {
      // Reemplaza cada "11" con span naranja sin afectar a "1" sueltos.
      // En HH:MM:SS un segmento de 2 dígitos solo puede tener un "11" como mucho.
      return timeStr.replace(/11/g, '<span class="dgt-11">11</span>');
    }

    function updateClock() {
      const now = new Date();
      const timeStr = pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
      el.innerHTML = highlightElevens(timeStr);
    }

    updateClock();
    setInterval(updateClock, 1000);
  })();
</script>

<script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.42/bundled/lenis.min.js"></script>
<script>
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  if (!prefersReducedMotion) {
    const lenis = new Lenis({
      lerp: 0.1,
      smoothWheel: true,
      smoothTouch: false,
      wheelMultiplier: 1,
      touchMultiplier: 2,
    });

    function raf(time) {
      lenis.raf(time);
      requestAnimationFrame(raf);
    }
    requestAnimationFrame(raf);

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', (e) => {
        e.preventDefault();
        const targetId = anchor.getAttribute('href');
        if (targetId === '#') return;
        const target = document.querySelector(targetId);
        if (target) {
          lenis.scrollTo(target, { offset: 0, duration: 1.2 });
        }
      });
    });
  }
</script>
